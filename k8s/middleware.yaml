# middleware.yaml — Traefik StripPrefix middleware that removes /api before
# forwarding requests to the backend. Without this the backend receives
# /api/contacts/ but its router only handles /contacts/.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api
  namespace: addressbook
spec:
  stripPrefix:
    prefixes:
      - /api
