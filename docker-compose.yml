services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: addressbook
      POSTGRES_USER: addressbook
      POSTGRES_PASSWORD: addressbook123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U addressbook"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: addressbook
      POSTGRES_PASSWORD: addressbook123
      POSTGRES_HOST: postgres
      POSTGRES_DB: addressbook
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
