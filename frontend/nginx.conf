# nginx.conf — Serves the React SPA and proxies /api/* to the backend.
server {
  listen 80;

  # Proxy API requests to the backend, stripping the /api prefix.
  # In Docker Compose the backend is reachable at http://backend:8000.
  location /api/ {
    proxy_pass http://backend:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Serve the React SPA; unknown paths fall back to index.html.
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
